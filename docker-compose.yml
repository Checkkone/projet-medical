services:

  # Base de données PostgreSQL — pour le RDV Service
  postgres:
    image: postgres:15
    container_name: bdd_rdv
    environment:
      POSTGRES_DB: rdv_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Base de données MongoDB — pour le Patient Service
  mongodb:
    image: mongo:6
    container_name: bdd_patients
    environment:
      MONGO_INITDB_DATABASE: patients_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

# Message Broker RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: secret123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  postgres_data:
  mongo_data:
  rabbitmq_data: